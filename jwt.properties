# =============================================================================
# jwt.properties — Salesforce JWT Bearer Flow Configuration
# =============================================================================
# Fill in the values provided by your Salesforce Administrator.
# Then run one of:
#   java GenerateJWT --config jwt.properties
#   node GenerateJWT.js --config jwt.properties
#   python GenerateJWT.py --config jwt.properties
# =============================================================================

# ECA Consumer Key (JWT "iss" claim)
# Source: SF Admin → Setup → External Client Apps → Settings tab
consumer_key=YOUR_CONSUMER_KEY_HERE

# Salesforce integration username (JWT "sub" claim)
# Source: SF Admin → Setup → Users
username=YOUR_SF_USERNAME_HERE

# My Domain URL (JWT "aud" claim)
# Sandbox:    https://[MyDomain]--[SandboxName].sandbox.my.salesforce.com
# Production: https://[MyDomain].my.salesforce.com
audience=https://YOUR_DOMAIN.my.salesforce.com

# Path to your RSA private key file (PEM format)
# Place private.key in the same folder as this file
private_key=private.key

# Token lifetime in seconds (max 180 — Salesforce enforces 3-minute limit)
expiry=180
