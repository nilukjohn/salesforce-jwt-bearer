# ─────────────────────────────────────────────────────────────────
# JWT Bearer Token Configuration
# Target: QA org (test.salesforce.com)
# ─────────────────────────────────────────────────────────────────

# ECA Consumer Key (iss)
consumer_key=YOUR_CONSUMER_KEY

# Salesforce integration username (sub)
username=your.user@yourcompany.com

# Token endpoint audience (aud)
# Sandbox format: https://[MyDomain]--[SandboxName].sandbox.my.salesforce.com
# Production format: https://[MyDomain].my.salesforce.com
audience=https://[your-org].my.salesforce.com

# Path to RS256 PEM private key
private_key=server.key

# JWT expiry in seconds (max 180 per Salesforce policy)
expiry=180
